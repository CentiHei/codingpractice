<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google</title>

    <style>
        .cover {
            display: flex;
            justify-content: space-between;
        }

        .btn_all {
            border: 0px;
            background-color: rgba(0, 0, 0, 0);
            color: black;
            font-size: medium;
        }

        .btn1 {
            padding: 15px 0px 0px 20px
        }

        .btn2 {
            padding-left: 15px;
        }

        .btn3 {
            padding-right: 15px;
        }

        .btn4 {
            padding: 15px 20px 0px 0px
        }

        .box {
            width: 600px;
            height: 50px;
            margin: auto;
            display: block;
            border-radius: 50px;
            border: 1px solid #C0C0C0;
            padding-left: 50px;
            font-size: 20px;

            background-image: url("6-cutout.png");
            background: ;
            background-position: 5px center;


        }

        .btn-under {
            border: 0px;
            background-color: #f5f5f5;
        }

        .google {
            width: 300px;
            height: 100px;

            background-image: url("https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png");
            background-size: cover;
            background-position: center;

            display: block;
            margin: auto;
            margin-top: 250px;
            margin-bottom: 30px;
        }

        .base {
            width: 800px;
            margin: auto;
        }

        .btnsubmit {
            width: 500px;
            margin: auto;
            margin-top: 30px;
        }
        .btnsubmit1 {
            margin-left: 120px;
            padding: 10px 15px 10px 15px;
            font-size: 15px;
            border-radius: 3px;
        }
        .btnsubmit2 {
            margin-left: 10px;
            padding: 10px 15px 10px 15px;
            font-size: 15px;
            border-radius: 3px;
        }
        .#drop_the_text input{
            background: whitesmoke;
            background-image: url("6-cutout.png");
            background-position: 5px center;
        }


    </style>
</head>
<body>
<header>
    <div class="cover">
        <div>
            <button class="btn_all btn1">Google 정보</button>
            <button class="btn_all btn2">스토어</button>
        </div>
        <div>
            <button class="btn_all btn3">Gmail</button>
            <button class="btn_all btn4">이미지</button>
        </div>
    </div>
</header>

<article>
    <div class="google"></div>
    <div class="base">
        <div id="drop_the_text">
            <input type="text" class="box">
        </div>
        <div class="btnsubmit">
            <button class="btn-under btnsubmit1">Google 검색</button>
            <button class="btn-under btnsubmit2">I'm Feeling Lucky</button>
        </div>
    </div>


</article>


<footer></footer>
</body>
</html>
